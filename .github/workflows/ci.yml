name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: |
          pytest -q \
            --ignore=tests/test_streaming.py \
            --ignore=tests/test_smoke.py
        env:
          # Point to local paths for CI — no real AWS/Kafka/Flink needed
          FEATURES_PATH: data/features
          MLFLOW_TRACKING_URI: http://localhost:5000
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092

  docker-build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Build images (no push)
        run: docker compose build --parallel
        continue-on-error: true   # tolerate if base images pull slowly in CI


        