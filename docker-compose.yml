# VeloShelf local stack (Phase 2).
# Kafka (KRaft) + Postgres + MLflow + Dagster + Flink (jobmanager + taskmanager).
# Redis kept in for reference; Postgres is the locked-in serving store.

services:
  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"    # host access
      - "29092:29092"  # docker-internal access
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=veloshelf
      - POSTGRES_PASSWORD=veloshelf
      - POSTGRES_DB=veloshelf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veloshelf"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

  dagster:
    image: python:3.11-slim
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "pip install dagster==1.9.4 dagster-webserver==1.9.4 dagster-graphql==1.9.4 &&
               dagster dev -h 0.0.0.0 -p 3000 -f orchestration/definitions.py"
    depends_on:
      - kafka
      - postgres

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: veloshelf
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  # -------------------------------------------------------------------
  # Flink (added Phase 2)
  # -------------------------------------------------------------------
  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    ports:
      - "8081:8081"     # Flink web UI
    command: jobmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: flink-jobmanager"
      - PYTHONPATH=/opt/veloshelf
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ./streaming:/opt/veloshelf/streaming
      - ./generator:/opt/veloshelf/generator
      - ./data:/opt/veloshelf/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8081/overview || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    command: taskmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: flink-jobmanager"
      - PYTHONPATH=/opt/veloshelf
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ./streaming:/opt/veloshelf/streaming
      - ./generator:/opt/veloshelf/generator
      - ./data:/opt/veloshelf/data
    depends_on:
      - flink-jobmanager

volumes:
  mlflow_data:
  postgres_data: